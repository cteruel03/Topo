<!DOCTYPE html>
<html>
<head>
    <title>Whac A Mole</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif;  background-image: url(pasto.png);}
        .topo { width: 150px; margin: 10px; cursor: pointer; }
        .contenedor {
            display: grid;
            grid-template-columns: repeat(4, 150px);
            gap: 10px;
            justify-content: center;
            margin: auto;
        }

        h1{
            color:rgb(0, 0, 0);
            background-color: cornflowerblue;
        
        }
    </style>
</head>
<body>
    <h1>Whac A Mole</h1>

<h2>Puntuació: <span class="score">0</span></h2>
<h2>Falls: <span class="falls">0</span></h2>


<div class="contenedor">
    <img class="topo" src="topoNo.jpg" onclick="cop(0)">
    <img class="topo" src="topoNo.jpg" onclick="cop(1)">
    <img class="topo" src="topoNo.jpg" onclick="cop(2)">
    <img class="topo" src="topoNo.jpg" onclick="cop(3)">
    <img class="topo" src="topoNo.jpg" onclick="cop(4)">
    <img class="topo" src="topoNo.jpg" onclick="cop(5)">
    <img class="topo" src="topoNo.jpg" onclick="cop(6)">
    <img class="topo" src="topoNo.jpg" onclick="cop(7)">
    <img class="topo" src="topoNo.jpg" onclick="cop(8)">
    <img class="topo" src="topoNo.jpg" onclick="cop(9)">
    <img class="topo" src="topoNo.jpg" onclick="cop(10)">
    <img class="topo" src="topoNo.jpg" onclick="cop(11)">
</div>

<script>
var nivells = [2000, 1200, 700];
var nivellActual = 0;
var intervalId;

var punts = 0;
var falls = 0;
var record = 0;

var topes = document.querySelectorAll(".topo");
var topoFora = [];

for(var i=0; i<topes.length; i++){
    topoFora[i] = false;
}

function iniciarjoc(){
    if(intervalId){
        clearInterval(intervalId);
    }
    intervalId = setInterval(apareixTopo, nivells[nivellActual]);
}

function revisarnivell(){
    if(punts >= 50 && nivellActual === 0){
        nivellActual = 1;
        iniciarjoc();
    }
    else if(punts >= 100 && nivellActual === 1){
        nivellActual = 2;
        iniciarjoc();
    }
}

function apareixTopo(){
    for(var i=0; i<topes.length; i++){
        topes[i].src = "topoNo.jpg";
        topoFora[i] = false;
    }

    var quantitat = Math.floor(Math.random() * 3) + 1;
    var mostrats = 0;

    while(mostrats < quantitat){
        var index = Math.floor(Math.random() * topes.length);

        if(!topoFora[index]){
            topes[index].src = "topoSi.jpg";
            topoFora[index] = true;
            mostrats++;
        }
    }
}

function cop(index){

    if(topoFora[index]){

        punts += 10;
        document.querySelector(".score").innerHTML = punts;

        var audio = new Audio('boing.mp3');
        audio.play();

        topes[index].src = "topoNo.jpg";
        topoFora[index] = false;

        revisarnivell();
        comprobarRecord();

    } else {

        fallar(index);

    }

}

function fallar(index){

    if(!topoFora[index]){

        falls += 1;
        document.querySelector(".falls").innerHTML = falls;

        perds();

    }

}

function perds(){

    if(falls >= 100){

        alert("Has perdut!");

        punts = 0;
        falls = 0;

        document.querySelector(".score").innerHTML = punts;
        document.querySelector(".falls").innerHTML = falls;

        nivellActual = 0;
        iniciarjoc();

    }

}

function comprobarRecord(){

    if(punts > record){
        record = punts;
        console.log("Nou record: " + record);
    }

}

iniciarjoc();
    


// Iniciar el juego al cargar
iniciarjoc();
</script>

</body>
</html>
